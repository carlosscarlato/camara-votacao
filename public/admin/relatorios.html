<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios — WebVoto</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/tenant.php">
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-6xl mx-auto px-4 py-10">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-black text-slate-800 mb-1">Relatórios</h1>
      <p class="text-slate-500 text-sm">Exporte dados em PDF, Excel, CSV ou JSON.</p>
    </div>
    <a href="relatorios-ia.html" class="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold px-4 py-2 rounded-xl transition">✨ Relatórios com IA</a>
  </div>

  <!-- Filtros -->
  <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
    <h2 class="font-bold text-slate-700 mb-4">Filtros</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Tipo de Relatório</label>
        <select id="tipo" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="atualizarFiltros()">
          <option value="sessoes">Sessões Plenárias</option>
          <option value="votos">Votações</option>
          <option value="vereadores">Vereadores</option>
          <option value="usuarios">Usuários</option>
          <option value="tribuna">Tribuna</option>
          <option value="auditoria">Auditoria</option>
        </select>
      </div>
      <div id="filtro-data-inicio">
        <label class="block text-sm font-semibold text-slate-600 mb-1">Data Início</label>
        <input type="date" id="data_inicio" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div id="filtro-data-fim">
        <label class="block text-sm font-semibold text-slate-600 mb-1">Data Fim</label>
        <input type="date" id="data_fim" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div id="filtro-status">
        <label class="block text-sm font-semibold text-slate-600 mb-1">Status</label>
        <select id="status" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Todos</option>
          <option value="aberta">Aberta</option>
          <option value="encerrada">Encerrada</option>
        </select>
      </div>
      <div id="filtro-resultado">
        <label class="block text-sm font-semibold text-slate-600 mb-1">Resultado</label>
        <select id="resultado" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Todos</option>
          <option value="aprovado">Aprovado</option>
          <option value="rejeitado">Rejeitado</option>
          <option value="prejudicado">Prejudicado</option>
        </select>
      </div>
    </div>
    <div class="flex gap-3 mt-5">
      <button onclick="gerar('json')" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-5 py-2 rounded-xl transition">Visualizar</button>
      <button onclick="gerar('pdf')" class="bg-red-600 hover:bg-red-700 text-white text-sm font-bold px-5 py-2 rounded-xl transition flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>PDF
      </button>
      <button onclick="gerar('xlsx')" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold px-5 py-2 rounded-xl transition flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>Excel
      </button>
      <button onclick="gerar('csv')" class="bg-amber-500 hover:bg-amber-600 text-white text-sm font-bold px-5 py-2 rounded-xl transition">CSV</button>
      <button onclick="gerar('json','dl')" class="border border-slate-300 hover:bg-slate-50 text-slate-700 text-sm font-bold px-5 py-2 rounded-xl transition">JSON</button>
    </div>
  </section>

  <!-- Resultados -->
  <section id="resultado-section" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <div class="p-4 border-b border-slate-100 flex items-center justify-between">
      <h2 id="titulo-relatorio" class="font-bold text-slate-700"></h2>
      <span id="total-registros" class="text-sm text-slate-500"></span>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm" id="tabela-resultado">
        <thead id="thead-resultado" class="bg-slate-50 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider"></thead>
        <tbody id="tbody-resultado" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
    <div id="sem-dados" class="hidden text-center py-12 text-slate-400">
      Nenhum registro encontrado com os filtros selecionados.
    </div>
  </section>

  <!-- Relatórios Agendados -->
  <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mt-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-bold text-slate-700">Relatórios Agendados</h2>
      <button onclick="abrirModalAgendar()" class="text-sm bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg font-semibold transition">+ Agendar</button>
    </div>
    <div id="lista-agendados" class="space-y-2">
      <p class="text-slate-400 text-sm text-center py-4" id="sem-agendados">Nenhum relatório agendado.</p>
    </div>
  </section>
</div>

<!-- Modal Agendar -->
<div id="modal-agendar" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
    <h3 class="font-bold text-lg text-slate-800 mb-4">Agendar Relatório</h3>
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Tipo</label>
        <select id="ag-tipo" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
          <option value="sessoes">Sessões</option>
          <option value="votos">Votações</option>
          <option value="vereadores">Vereadores</option>
          <option value="auditoria">Auditoria</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Frequência</label>
        <select id="ag-freq" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
          <option value="daily">Diário</option>
          <option value="weekly">Semanal</option>
          <option value="monthly">Mensal</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Destinatários (um e-mail por linha)</label>
        <textarea id="ag-recipients" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm font-mono"></textarea>
      </div>
    </div>
    <div class="flex gap-3 mt-5">
      <button onclick="salvarAgendamento()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-xl">Salvar</button>
      <button onclick="fecharModal()" class="flex-1 border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-2 rounded-xl">Cancelar</button>
    </div>
  </div>
</div>

<script>
const BASE = '../..';

function coletarFiltros() {
  return {
    tipo:        document.getElementById('tipo').value,
    data_inicio: document.getElementById('data_inicio').value,
    data_fim:    document.getElementById('data_fim').value,
    status:      document.getElementById('status').value,
    resultado:   document.getElementById('resultado').value,
  };
}

async function gerar(formato, dl) {
  const f = coletarFiltros();
  const params = new URLSearchParams({ ...f, formato });
  if (formato !== 'json' || dl) {
    window.location.href = `${BASE}/api/reports.php?action=gerar&${params.toString()}`;
    return;
  }
  const r = await fetch(`${BASE}/api/reports.php?action=gerar&${params.toString()}`);
  const j = await r.json();
  if (!j.success) { alert(j.error || 'Erro ao gerar relatório'); return; }
  renderizar(j.data);
}

function renderizar({ titulo, colunas, dados }) {
  document.getElementById('titulo-relatorio').textContent = titulo;
  document.getElementById('total-registros').textContent = `${dados.length} registros`;
  const thead = document.getElementById('thead-resultado');
  const tbody = document.getElementById('tbody-resultado');
  const semDados = document.getElementById('sem-dados');
  thead.innerHTML = '';
  tbody.innerHTML = '';
  document.getElementById('resultado-section').classList.remove('hidden');
  if (!dados.length) { semDados.classList.remove('hidden'); return; }
  semDados.classList.add('hidden');
  const tr = document.createElement('tr');
  colunas.forEach(c => {
    const th = document.createElement('th');
    th.className = 'px-4 py-3';
    th.textContent = c;
    tr.appendChild(th);
  });
  thead.appendChild(tr);
  dados.forEach(row => {
    const tr2 = document.createElement('tr');
    tr2.className = 'hover:bg-slate-50 transition';
    Object.values(row).forEach(v => {
      const td = document.createElement('td');
      td.className = 'px-4 py-3 text-slate-700';
      td.textContent = v ?? '';
      tr2.appendChild(td);
    });
    tbody.appendChild(tr2);
  });
}

function atualizarFiltros() {
  const tipo = document.getElementById('tipo').value;
  const mostrar = { status: ['sessoes','votos'], resultado: ['votos'], 'data-inicio': ['sessoes','votos','tribuna','auditoria'], 'data-fim': ['sessoes','votos','tribuna','auditoria'] };
  ['data-inicio','data-fim','status','resultado'].forEach(id => {
    const el = document.getElementById(`filtro-${id}`);
    if (el) el.style.display = (mostrar[id] || []).includes(tipo) ? '' : 'none';
  });
}

async function carregarAgendados() {
  const r = await fetch(`${BASE}/api/reports.php?action=listar_agendados`);
  const j = await r.json();
  const lista = document.getElementById('lista-agendados');
  const sem   = document.getElementById('sem-agendados');
  if (!j.success || !j.data.length) { sem.classList.remove('hidden'); return; }
  sem.classList.add('hidden');
  lista.innerHTML = '';
  j.data.forEach(ag => {
    const freq = { daily: 'Diário', weekly: 'Semanal', monthly: 'Mensal' }[ag.frequency] || ag.frequency;
    const div = document.createElement('div');
    div.className = 'flex items-center justify-between p-3 bg-slate-50 rounded-xl';
    div.innerHTML = `
      <div>
        <span class="font-semibold text-sm text-slate-700 capitalize">${ag.type}</span>
        <span class="ml-2 text-xs text-slate-500 bg-slate-200 px-2 py-0.5 rounded-full">${freq}</span>
      </div>
      <button onclick="deletarAgendado(${ag.id})" class="text-xs text-red-500 hover:text-red-700">Remover</button>
    `;
    lista.appendChild(div);
  });
}

async function deletarAgendado(id) {
  if (!confirm('Remover este agendamento?')) return;
  await fetch(`${BASE}/api/reports.php`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'deletar_agendado', id }),
  });
  carregarAgendados();
}

function abrirModalAgendar() { document.getElementById('modal-agendar').classList.remove('hidden'); }
function fecharModal()       { document.getElementById('modal-agendar').classList.add('hidden'); }

async function salvarAgendamento() {
  const recipients = document.getElementById('ag-recipients').value.split('\n').map(e => e.trim()).filter(Boolean);
  const body = { action: 'salvar_agendado', type: document.getElementById('ag-tipo').value, frequency: document.getElementById('ag-freq').value, recipients };
  const r = await fetch(`${BASE}/api/reports.php`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const j = await r.json();
  if (j.success) { fecharModal(); carregarAgendados(); }
  else alert(j.error || 'Erro ao salvar');
}

atualizarFiltros();
carregarAgendados();
</script>
</body>
</html>
