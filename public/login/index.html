<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Câmara Municipal</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; }
  .bg-login { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%); }
  input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.2); }
</style>
</head>
<body class="bg-login min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <!-- Card de login -->
  <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
    <!-- Header do card -->
    <div class="bg-slate-800 px-8 py-6 text-center">
      <div class="text-5xl mb-2">🏛️</div>
      <h1 class="text-white font-black text-2xl">Câmara Municipal</h1>
      <p class="text-slate-400 text-sm mt-1">Sistema de Votação Eletrônica</p>
    </div>

    <!-- Tabs: Admin / Vereador -->
    <div class="flex border-b border-slate-200">
      <button id="tab-admin" onclick="setTab('admin')"
        class="flex-1 py-3 text-sm font-bold text-blue-600 border-b-2 border-blue-600 transition">
        🖥️ Mesa Diretora
      </button>
      <button id="tab-vereador" onclick="setTab('vereador')"
        class="flex-1 py-3 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:text-slate-700 transition">
        📱 Vereador
      </button>
    </div>

    <div class="px-8 py-7">
      <!-- ── Formulário Admin ──────────────────────────────── -->
      <form id="form-admin" onsubmit="loginAdmin(event)" class="space-y-4">
        <div>
          <label class="block text-sm text-slate-500 mb-1 font-semibold">Login</label>
          <input id="adm-login" type="text" autocomplete="username" placeholder="admin"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 text-slate-800 text-sm">
        </div>
        <div>
          <label class="block text-sm text-slate-500 mb-1 font-semibold">Senha</label>
          <div class="relative">
            <input id="adm-senha" type="password" autocomplete="current-password" placeholder="••••••••"
              class="w-full border border-slate-300 rounded-xl px-4 py-3 pr-11 text-slate-800 text-sm">
            <button type="button" onclick="togglePass('adm-senha', this)"
              class="absolute inset-y-0 right-3 flex items-center text-slate-400 hover:text-slate-600 transition">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input id="adm-remember" type="checkbox" class="w-4 h-4 accent-blue-600">
            <span class="text-sm text-slate-600">Lembrar-me por 30 dias</span>
          </label>
          <a href="../recuperar-senha/" class="text-blue-600 text-sm hover:underline">Esqueci a senha</a>
        </div>
        <p id="adm-erro" class="text-red-500 text-sm hidden"></p>
        <button type="submit" id="adm-btn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl text-base transition">
          Entrar
        </button>
      </form>

      <!-- ── Formulário Vereador ───────────────────────────── -->
      <form id="form-vereador" onsubmit="loginVereador(event)" class="space-y-4 hidden">
        <div>
          <label class="block text-sm text-slate-500 mb-1 font-semibold">Selecione seu nome</label>
          <select id="ver-nome" class="w-full border border-slate-300 rounded-xl px-4 py-3 text-slate-800 text-sm">
            <option value="">Carregando...</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-slate-500 mb-1 font-semibold">PIN de 6 dígitos</label>
          <div class="relative">
            <input id="ver-pin" type="password" maxlength="6" inputmode="numeric" placeholder="••••••"
              class="w-full border border-slate-300 rounded-xl px-4 py-3 pr-11 text-slate-800 text-xl text-center tracking-widest">
            <button type="button" onclick="togglePass('ver-pin', this)"
              class="absolute inset-y-0 right-3 flex items-center text-slate-400 hover:text-slate-600 transition">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <p id="ver-erro" class="text-red-500 text-sm hidden"></p>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl text-base transition">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <p class="text-center text-slate-500 text-xs mt-6">
    <a href="../" class="hover:text-white transition">← Voltar ao início</a>
  </p>
</div>

<script>
const EYE     = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_OFF = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show ? EYE_OFF : EYE;
}

const BASE = '../..';

function setTab(tab) {
  const isAdmin = tab === 'admin';
  document.getElementById('form-admin').classList.toggle('hidden', !isAdmin);
  document.getElementById('form-vereador').classList.toggle('hidden', isAdmin);
  document.getElementById('tab-admin').className    = `flex-1 py-3 text-sm font-bold transition border-b-2 ${isAdmin ? 'text-blue-600 border-blue-600' : 'text-slate-500 border-transparent hover:text-slate-700'}`;
  document.getElementById('tab-vereador').className = `flex-1 py-3 text-sm font-bold transition border-b-2 ${!isAdmin ? 'text-blue-600 border-blue-600' : 'text-slate-500 border-transparent hover:text-slate-700'}`;
}

async function loginAdmin(e) {
  e.preventDefault();
  const btn   = document.getElementById('adm-btn');
  const errEl = document.getElementById('adm-erro');
  const login    = document.getElementById('adm-login').value.trim();
  const senha    = document.getElementById('adm-senha').value;
  const remember = document.getElementById('adm-remember').checked;

  errEl.classList.add('hidden');
  btn.textContent = 'Entrando...';
  btn.disabled = true;

  try {
    const r    = await fetch(`${BASE}/api/auth.php?action=login_admin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, senha, remember }),
    });
    const json = await r.json();
    if (!json.success) {
      errEl.textContent = json.error || 'Credenciais inválidas.';
      errEl.classList.remove('hidden');
      btn.textContent = 'Entrar';
      btn.disabled = false;
      return;
    }
    const perfil = json.data.perfil;
    window.location.href = perfil === 'admin' ? '../admin/' : '../controle/';
  } catch {
    errEl.textContent = 'Erro de conexão. Tente novamente.';
    errEl.classList.remove('hidden');
    btn.textContent = 'Entrar';
    btn.disabled = false;
  }
}

async function loginVereador(e) {
  e.preventDefault();
  const errEl = document.getElementById('ver-erro');
  const vid   = document.getElementById('ver-nome').value;
  const pin   = document.getElementById('ver-pin').value;
  errEl.classList.add('hidden');
  if (!vid || !pin) { errEl.textContent = 'Selecione seu nome e informe o PIN.'; errEl.classList.remove('hidden'); return; }

  const r    = await fetch(`${BASE}/api/auth.php?action=login_vereador`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ vereador_id: Number(vid), pin }),
  });
  const json = await r.json();
  if (!json.success) { errEl.textContent = json.error; errEl.classList.remove('hidden'); return; }
  window.location.href = '../vereador/';
}

// Carregar lista de vereadores
fetch(`${BASE}/api/auth.php?action=lista_vereadores`).then(r => r.json()).then(json => {
  const sel = document.getElementById('ver-nome');
  sel.innerHTML = '<option value="">— Selecione —</option>';
  (json.data || []).forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.id;
    opt.textContent = `${v.nome} (${v.partido})`;
    sel.appendChild(opt);
  });
});
</script>
</body>
</html>
